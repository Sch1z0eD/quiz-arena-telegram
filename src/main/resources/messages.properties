rules.text=<blockquote expandable>Rules\n\n\
How to play\n\
• "Play" or /quiz — pick a category and difficulty and answer with the buttons.\n\
• Solo in a private chat, or together in a group: after the start, tap the Join button in the lobby.\n\
• Every question is timed. A correct answer earns points with a speed bonus: the sooner you answer, the more; a wrong answer scores zero.\n\n\
One-on-one duels\n\
• A random opponent, a challenge to a friend by link, or a challenge from any chat by @-mentioning the bot.\n\
• Duels use an ELO rating (starts at 1000): a win raises it, a loss lowers it.\n\n\
Ratings\n\
• Leaderboards: global, per-chat, and weekly — filled by regular games.\n\
• ELO changes only in duels.\n\n\
Language\n\
• Switched from the menu; it changes both the interface and the question language. Duels run in a single question language.\n\n\
Commands\n\
/quiz [category] [difficulty] — quick start\n\
/top, /top week, /top global — leaderboards\n\
/rank — your standing and ELO\n\
/menu — open the menu</blockquote>

