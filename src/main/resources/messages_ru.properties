rules.text=Правила\n\n\
Как играть\n\
• «Играть» или /quiz — выбери категорию и сложность и отвечай кнопками.\n\
• Соло — в личке с ботом; компанией — в группе: после старта жми «Участвую» в лобби.\n\
• На каждый вопрос есть таймер. За правильный ответ — очки с бонусом за скорость: чем раньше ответил, тем больше; за неправильный — ноль.\n\n\
Дуэли 1 на 1\n\
• Случайный соперник, вызов друга по ссылке или вызов из любого чата через @-упоминание бота.\n\
• В дуэлях работает рейтинг ELO (старт 1000): победа поднимает, поражение опускает.\n\n\
Рейтинги\n\
• Лидерборды: глобальный, по чату и за неделю — их наполняют обычные игры.\n\
• ELO меняется только в дуэлях.\n\n\
Язык\n\
• Переключается в меню и влияет и на интерфейс, и на язык вопросов. Дуэли идут на одном языке вопросов.\n\n\
Команды\n\
/quiz [категория] [сложность] — быстрый старт\n\
/top, /top week, /top global — лидерборды\n\
/rank — твоё место и ELO\n\
/menu — открыть меню

