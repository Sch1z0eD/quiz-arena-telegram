spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:quizarena}
spring.datasource.username=${DB_USER:quiz}
spring.datasource.password=${DB_PASSWORD:quiz}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true

spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}

telegram.bot.token=${BOT_TOKEN}

brand.name=QUIZARENA2
brand.handle=@QuizArenaBot2

game.lobby-seconds=20
game.question-seconds=15
game.base-points=100
game.questions-per-game=5
game.ttl=1h

quiz.import.enabled=${IMPORT_ENABLED:false}
quiz.import.amount-per-call=50

duel.search-seconds=45
duel.question-seconds=20
duel.question-count=5
duel.base-points=100

spring.messages.basename=messages
spring.messages.encoding=UTF-8
spring.messages.fallback-to-system-locale=false

spring.main.web-application-type=none
