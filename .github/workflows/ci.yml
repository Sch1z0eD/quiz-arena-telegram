name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# This workflow only builds and tests, so a read-only token is enough.
permissions:
  contents: read

# Cancel superseded runs for the same branch or PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          # Verifies the committed gradle-wrapper.jar against known-good checksums (supply-chain guard).
          validate-wrappers: true

      # No `services:` block: the integration tests use Testcontainers, which starts its own Postgres
      # and Redis on the runner's Docker daemon. No secrets either - the lifecycle test sets
      # telegram.bot.token=test:dummy and excludes the Telegram bot autoconfiguration.
      - name: Build and test
        run: ./gradlew build
