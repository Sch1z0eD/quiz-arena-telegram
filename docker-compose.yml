name: quizarena

services:
  app:
    build: .
    image: quizarena-app
    container_name: quizarena-app
    environment:
      # Reach Postgres and Redis by service name, not localhost. The app builds its datasource URL
      # from DB_HOST/DB_PORT (defaults in application.properties), so only the host needs overriding.
      DB_HOST: postgres
      REDIS_HOST: redis
      BOT_TOKEN: ${BOT_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16
    container_name: quizarena-postgres
    environment:
      POSTGRES_DB: quizarena
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U quiz -d quizarena"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: quizarena-redis
    # Persist to disk: leaderboards and ELO are all-time and must survive a restart.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
  redisdata:
