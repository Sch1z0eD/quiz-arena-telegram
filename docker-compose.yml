services:
  postgres:
    image: postgres:16
    container_name: quizarena-postgres
    environment:
      POSTGRES_DB: quizarena
      POSTGRES_USER: quiz
      POSTGRES_PASSWORD: quiz
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: quizarena-redis
    ports:
      - "6379:6379"

volumes:
  pgdata: